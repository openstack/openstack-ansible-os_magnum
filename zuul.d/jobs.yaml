---
- job:
    # test a full deployment of openstack, k8s control plane, octavia, magnum+magnum_cluster_api
    name: openstack-ansible-deploy-aio_magnum_octavia_capi_kvm-base
    parent: openstack-ansible-deploy-aio
    nodeset: osa-ubuntu-noble-32GB
    vars:
      osa_pre_run_bootstrap: false
      osa_extra_ansible_collections:
        - name: vexxhost.kubernetes
          source: https://github.com/vexxhost/ansible-collection-kubernetes
          type: git
          version: main
    required-projects:
      - name: openstack/openstack-ansible-ops
    pre-run:
      - zuul.d/playbooks/bootstrap-mcapi-vexxhost.yml

- job:
    # test a full deployment of mcapi on ubuntu noble
    name: openstack-ansible-deploy-aio_magnum_octavia_capi_kvm-ubuntu-noble
    parent: openstack-ansible-deploy-aio_magnum_octavia_capi_kvm-base
    nodeset: osa-ubuntu-noble-32GB

- job:
    # test a deployment of only the high-availability control plane k8s cluster
    name: openstack-ansible-deploy-hosts_lxc_capi_k8sHA-base
    parent: openstack-ansible-deploy-aio-hosts
    vars:
      osa_pre_run_bootstrap: false
      osa_extra_ansible_collections:
        - name: vexxhost.kubernetes
          source: https://github.com/vexxhost/ansible-collection-kubernetes
          type: git
          version: main
    required-projects:
      - name: openstack/openstack-ansible-ops
    pre-run:
      - zuul.d/playbooks/bootstrap-mcapi-k8s.yml

- job:
    name: openstack-ansible-deploy-hosts_lxc_capi_k8sHA-ubuntu-noble
    parent: openstack-ansible-deploy-hosts_lxc_capi_k8sHA-base
    nodeset: ubuntu-noble

- job:
    name: openstack-ansible-deploy-hosts_lxc_capi_k8sHA-debian-trixie
    parent: openstack-ansible-deploy-hosts_lxc_capi_k8sHA-base
    nodeset: osa-debian-trixie

- job:
    name: openstack-ansible-deploy-hosts_lxc_capi_k8sHA-rockylinux-10
    parent: openstack-ansible-deploy-hosts_lxc_capi_k8sHA-base
    nodeset: osa-rockylinux-10
