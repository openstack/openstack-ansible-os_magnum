- name: Install rust on build host(s)
  ansible.builtin.include_tasks:
    file: "magnum_capi_vexxhost_rust.yml"
    apply:
      tags:
        - rust-install
  vars:
    build_host: "{{ rust_host }}"
  run_once: true
  loop: "{{ groups.get('repo_all', []) + groups[magnum_services['magnum-conductor']['group']] }}"
  loop_control:
    loop_var: rust_host
  tags:
    - rust-install
