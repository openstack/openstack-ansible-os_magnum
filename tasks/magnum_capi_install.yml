- name: Gather variables for respective CAPI driver
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "capi_{{ magnum_k8s_driver }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true

- name: Set up helm and k8s credentials in magnum hosts
  vars:
    k8s_admin_conf_src: "/etc/kubernetes/admin.conf"
    k8s_admin_conf_dest: "/var/lib/magnum/.kube/config"
  tags:
    - magnum_k8s_conf
  block:
    - name: Collect admin config from k8s cluster
      ansible.builtin.slurp:
        src: "{{ k8s_admin_conf_src }}"
      register: k8s_admin_conf_slurp
      delegate_to: "{{ groups[magnum_capi_control_cluster_group] | first }}"
      run_once: true

    - name: Ensure target directory exists
      ansible.builtin.file:
        state: directory
        path: "{{ k8s_admin_conf_dest | dirname }}"
        owner: magnum
        group: magnum
        mode: '0755'

    - name: Write k8s admin config to magnum home dir
      ansible.builtin.copy:
        content: "{{ k8s_admin_conf_slurp.content | b64decode }}"
        dest: "{{ k8s_admin_conf_dest }}"
        owner: magnum
        group: magnum
        mode: '0600'

    - name: Install helm
      ansible.builtin.include_role:
        name: "adriacloud.kubernetes.helm"

- name: Include driver-specific tasks for {{ magnum_k8s_driver }}
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "magnum_capi_{{ magnum_k8s_driver }}.yml"
      skip: true
