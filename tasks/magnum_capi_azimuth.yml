- name: Pull and deploy helm charts
  ansible.builtin.include_role:
    name: adriacloud.kubernetes.helm_deploy
  vars:
    helm_deploy_host_group: "{{ magnum_capi_control_cluster_group }}"
    helm_deploy_host: "{{ groups[helm_deploy_host_group] | first }}"
    helm_deploy_python_interpreter: "{{ hostvars[helm_deploy_host]['ansible_collection_kubernetes_target_venv'] }}/bin/python3"
    helm_deploy_charts: "{{ magnum_capi_azimuth_helm_charts }}"
