# create virtualenv
- name: Install the python venv
  ansible.builtin.import_role:
    name: "python_venv_build"
  vars:
    venv_python_executable: "{{ openstack_venv_python_executable | default('python3') }}"
    venv_build_constraints: "{{ magnum_capi_vexxhost_proxy_git_constraints }}"
    venv_install_destination_path: "{{ magnum_capi_vexxhost_proxy_bin | dirname }}"
    venv_install_distro_package_list:
      - haproxy
    venv_pip_install_args: "{{ pip_install_options | default('') }}"
    venv_pip_packages: "{{ magnum_capi_vexxhost_proxy_pip_packages }}"

# create user and group
- name: Create the magnum_cluster_api_proxy system group
  ansible.builtin.group:
    name: "{{ magnum_capi_vexxhost_proxy_system_group_name }}"
    state: "present"
    system: "yes"

- name: Create the magnum_cluster_api_proxy system user
  ansible.builtin.user:
    name: "{{ magnum_capi_vexxhost_proxy_system_user_name }}"
    group: "{{ magnum_capi_vexxhost_proxy_system_group_name }}"
    comment: "{{ magnum_capi_vexxhost_proxy_system_user_comment }}"
    shell: "{{ magnum_capi_vexxhost_proxy_system_user_shell }}"
    system: "yes"
    createhome: "yes"
    home: "{{ magnum_capi_vexxhost_proxy_system_user_home }}"

- name: Create magnum_cluster_api_proxy directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: "directory"
    owner: "{{ item.owner | default(magnum_capi_vexxhost_proxy_system_user_name) }}"
    group: "{{ item.group | default(magnum_capi_vexxhost_proxy_system_group_name) }}"
    mode: "{{ item.mode | default('0750') }}"
  with_items:
    - path: "{{ magnum_capi_vexxhost_proxy_system_user_home }}"
    - path: "{{ magnum_capi_vexxhost_proxy_system_user_home }}/.kube"

- name: Collect admin config from k8s cluster
  ansible.builtin.slurp:
    src: "{{ magnum_capi_vexxhost_k8s_conf_src }}"
  register: k8s_admin_conf_slurp
  delegate_to: "{{ groups[magnum_capi_control_cluster_group] | first }}"
  run_once: true

- name: Write k8s admin config to capi_proxy home dir
  ansible.builtin.copy:
    content: "{{ k8s_admin_conf_slurp.content | b64decode }}"
    dest: "{{ magnum_capi_vexxhost_k8s_conf_dest }}"
    owner: "{{ magnum_capi_vexxhost_proxy_system_user_name }}"
    group: "{{ magnum_capi_vexxhost_proxy_system_group_name }}"
    mode: '0600'
  notify:
    - "k8s config changed"

- name: Write capi_proxy sudoers config
  ansible.builtin.template:
    src: capi_sudoers.j2
    dest: /etc/sudoers.d/capi_proxy_sudoers
    mode: '0440'

# create service
- name: Run the systemd service role
  ansible.builtin.import_role:
    name: systemd_service
  vars:
    systemd_user_name: "{{ magnum_capi_vexxhost_proxy_system_user_name }}"
    systemd_group_name: "{{ magnum_capi_vexxhost_proxy_system_group_name }}"
    systemd_tempd_prefix: openstack
    systemd_slice_name: magnum-cluster-api-proxy
    systemd_lock_path: /var/lock/magnum-cluster-api-proxy
    systemd_service_cpu_accounting: true
    systemd_service_block_io_accounting: true
    systemd_service_memory_accounting: true
    systemd_service_tasks_accounting: true
    systemd_services:
      - service_name: magnum-cluster-api-proxy
        execstarts:
          - "{{ magnum_capi_vexxhost_proxy_bin ~ '/magnum-cluster-api-proxy' }}"
        start_order: 1
        environment: "{{ magnum_capi_vexxhost_proxy_environment }}"
