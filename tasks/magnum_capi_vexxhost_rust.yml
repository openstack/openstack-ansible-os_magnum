- name: Install rust on the build host(s)
  delegate_to: "{{ build_host }}"
  block:
    - name: Gather build target facts
      ansible.builtin.setup:
        gather_subset: "!all:min"
      delegate_facts: true
      failed_when: false

    - name: Install rust dependencies
      ansible.builtin.package:
        name: "{{ magnum_rust_distro_packages }}"
        default_release: "{{ magnum_rust_distro_package_release | default(omit) }}"

    # Required where update-alternatives not available on Ubuntu, and LTS versions too old
    - name: Install symlinks for installed dependencies
      ansible.builtin.file:
        src: "/usr/bin/{{ filename }}"
        dest: "/usr/local/bin/{{ filename.split('-')[0] }}"
        state: link
      loop_control:
        loop_var: "filename"
      with_items: "{{ magnum_rust_distro_packages }}"
      when: magnum_rust_binary_symlinks | bool

    - name: Create cargo configuration directory where required
      ansible.builtin.file:
        dest: "{{ magnum_capi_vexxhost_rust_cargo_config_path | dirname }}"
        state: directory
        mode: "0755"
      when:
        - magnum_capi_vexxhost_rust_cargo_config | length > 0

    - name: Drop cargo configuration where required
      ansible.builtin.copy:
        content: "{{ magnum_capi_vexxhost_rust_cargo_config }}"
        dest: "{{ magnum_capi_vexxhost_rust_cargo_config_path }}"
        mode: "0644"
      when:
        - magnum_capi_vexxhost_rust_cargo_config | length > 0
