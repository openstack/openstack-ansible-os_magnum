## APT Cache options
cache_timeout: 600

_magnum_package_names_condition: >-
  {{
    (
      (ansible_facts['distribution'] | lower == 'debian' and ansible_facts['distribution_major_version'] is version('14', '>=')) or
        (ansible_facts['distribution'] | lower == 'ubuntu' and ansible_facts['distribution_version'] is version('26.04', '>='))
    )
  }}

_magnum_capi_ca_file: /etc/ssl/certs/ca-certificates.crt

magnum_distro_packages:
  - "{{ _magnum_package_names_condition | ternary('libxml2-16', 'libxml2') }}"

# Packages for buildind the python wheels
magnum_devel_distro_packages:
  - libssl-dev
  - libxml2-dev
  - libxslt1-dev
  - libpq-dev
  - libsystemd-dev
  - git
  - libffi-dev
  - gettext
  - build-essential

magnum_rust_distro_packages:
  - cargo-1.89
  - rustc-1.89

magnum_rust_binary_symlinks: true
